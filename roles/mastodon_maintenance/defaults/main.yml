---
mastodon_maintenance_enable: false
mastodon_maintenance_app_path: "/home/mastodon/live"
mastodon_maintenance_nginx_available_dir: "/etc/nginx/sites-available"
mastodon_maintenance_nginx_enabled_dir: "/etc/nginx/sites-enabled"
mastodon_maintenance_nginx_site_name: "mastodon"
mastodon_maintenance_page_dest: "/var/www/html/maintenance.html"
mastodon_maintenance_services:
  - mastodon-web
  - mastodon-sidekiq
  - mastodon-streaming
