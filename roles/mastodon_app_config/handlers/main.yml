---
- name: Restart Mastodon services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: restarted
  loop:
    - mastodon-web
    - mastodon-sidekiq
    - mastodon-streaming
  become: true
  ignore_errors: "{{ mastodon_ignore_restart_failure | default(false) }}"
  listen: "Restart Mastodon services"
