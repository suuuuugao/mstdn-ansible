---
- name: Configure .env.production from template
  ansible.builtin.template:
    src: env.production.j2
    dest: "{{ mastodon_app_path }}/.env.production"
    owner: "{{ mastodon_app_user_name }}"
    group: "{{ mastodon_app_user_name }}"
    mode: "0640"
  become: true
  become_user: "{{ mastodon_app_user_name }}"
  no_log: true
  notify: Restart Mastodon services
