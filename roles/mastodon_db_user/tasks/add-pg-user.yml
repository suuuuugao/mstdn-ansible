---
- name: Manage PostgreSQL user
  block:
    - name: Check if PostgreSQL user exists
      community.postgresql.postgresql_query:
        db: postgres
        query: "SELECT 1 FROM pg_roles WHERE rolname = '{{ mastodon_db_user_name }}'"
      register: __pg_user_check

    - name: Create PostgreSQL user (only if not exists)
      community.postgresql.postgresql_user:
        name: "{{ mastodon_db_user_name }}"
        password: "{{ mastodon_db_user_password }}"
        role_attr_flags: CREATEDB
      when: __pg_user_check.rowcount == 0

    - name: Display PostgreSQL password
      ansible.builtin.debug:
        var: mastodon_db_user_password
  become: true
  become_user: postgres
