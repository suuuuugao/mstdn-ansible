---
# 初回構築 Playbook — mastodon_setup.yml と同等
# 使い方: ansible-playbook -i inventory.yml playbooks/install.yml
- name: Mastodon install (full setup)
  hosts: all
  roles:
    - mastodon_sys_packages
    - mastodon_app_user
    - mastodon_db_packages
    - mastodon_db_user
    - mastodon_app_repository
    - mastodon_app_anyenv
    - mastodon_app_packages
    - mastodon_app_config
    - mastodon_app_systemd
